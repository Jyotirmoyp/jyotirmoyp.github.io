<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title }}</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
  --bg:#0f172a;
  --sidebar:#020617;
  --accent:#38bdf8;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body{
  display:flex;
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* Sidebar */

.sidebar{
  width:240px;
  background:var(--sidebar);
  padding:30px 20px;
  height:100vh;
  position:sticky;
  top:0;
  border-right:1px solid #1e293b;
}

.sidebar h3{
  margin-top:0;
  color:white;
  letter-spacing:1px;
}

.sidebar a{
  color:var(--muted);
  display:block;
  margin:12px 0;
  text-decoration:none;
  font-size:15px;
  transition:0.2s;
}

.sidebar a:hover{
  color:var(--accent);
  transform:translateX(3px);
}

/* Content */

.content{
  flex:1;
  max-width:900px;
  padding:60px;
}

.content h1{
  font-size:2.4rem;
  margin-top:0;
}

.content h2{
  margin-top:40px;
  color:#7dd3fc;
}

.content img{
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Mobile */

@media (max-width:800px){

  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid #1e293b;
  }

  .content{
    padding:30px;
  }

}

.block{
  background:#1a1a1a;      /* dark grey */
  padding:30px;
  margin:30px 0;
  border-radius:8px;
  border:1px solid #333;
  transition:0.3s;
}

.block:hover{
  background:#000000;      /* darker when hovered */
}

.icons{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.icons a{
  color:var(--muted);
  font-size:20px;
  text-decoration:none;
}

.icons a:hover{
  color:var(--accent);
}

</style>
</head>

<body>

<div class="sidebar">
{% include nav.html %}
</div>

<div class="content">
{{ content }}
</div>

</body>
</html>
